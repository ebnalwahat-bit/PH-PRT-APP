name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet[all]==0.21.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Build APK
        run: |
          # هذا الأمر يقوم ببناء ملف الـ APK ويدمج معه مجلد اللغات assets
          flet build apk --main main.py --assets assets

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PH-PRT-APP-Release
          path: build/apk/*.apk
          retention-days: 7
